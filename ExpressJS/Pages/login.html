<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Premium Login | Nexus UI</title>
    <style>
        .mesh-gradient {
            background-color: #000000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="mesh-gradient min-h-screen flex items-center justify-center p-6 text-white font-sans">

    <div class="glass w-full max-w-md rounded-3xl p-8 shadow-2xl transform transition-all hover:scale-[1.01]">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30">
                <i data-lucide="layers" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Welcome Back</h1>
            <p class="text-gray-400 mt-2">Enter your credentials to access your dashboard</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </span>
                    <input type="email" placeholder="name@company.com" 
                        class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-gray-600">
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-medium text-gray-300">Password</label>
                    <a href="#" class="text-sm text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </span>
                    <input type="password" placeholder="••••••••" 
                        class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-gray-600">
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-700 bg-gray-800 text-indigo-600 focus:ring-indigo-500">
                <label for="remember" class="ml-2 text-sm text-gray-400">Keep me logged in</label>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-600/20 transform transition-active active:scale-95 duration-200">
                Sign In
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#111] px-2 text-gray-500">Or continue with</span></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="flex items-center justify-center py-2.5 border border-white/10 rounded-xl hover:bg-white/5 transition-colors">
                <i data-lucide="github" class="w-5 h-5 mr-2"></i> GitHub
            </button>
            <button class="flex items-center justify-center py-2.5 border border-white/10 rounded-xl hover:bg-white/5 transition-colors">
                <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.162-1.908 4.162-1.248 1.248-3.132 2.688-6.932 2.688-6.192 0-11.016-5.016-11.016-11.208s4.824-11.208 11.016-11.208c3.348 0 5.856 1.32 7.716 3.108l2.316-2.316C19.164 1.632 16.2 0 12.48 0 5.688 0 0 5.688 0 12.48s5.688 12.48 12.48 12.48c3.708 0 6.504-1.212 8.76-3.564 2.328-2.328 3.06-5.58 3.06-8.196 0-.612-.048-1.188-.144-1.704h-11.676z"/></svg> Google
            </button>
        </div>

        <p class="text-center text-gray-400 mt-8 text-sm">
            Don't have an account? <a href="#" class="text-indigo-400 font-semibold hover:underline">Create account</a>
        </p>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
